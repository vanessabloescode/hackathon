<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Daily Sparks – People at Hypersolid</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --track: #d2d2d7;
      --fill: #1d1d1f;
      --control-tint: #1d1d1f;
      --play-circle: #1d1d1f;
      --play-icon: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
        "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 80px;
    }

    .player {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .title {
      margin: 0;
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.25;
      max-width: 320px;
    }

    .cover-wrap {
      width: min(88vw, 320px);
      aspect-ratio: 1;
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.06),
        0 8px 24px rgba(0, 0, 0, 0.08);
      background: #0a1628;
    }

    #cover {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .progress-block {
      width: 100%;
      max-width: 340px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--track);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 78%;
      border-radius: 2px;
      background: var(--fill);
      transition: width 0.25s linear;
    }

    .time {
      font-size: 0.75rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      min-width: 2.5rem;
      text-align: right;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      margin-top: 4px;
    }

    .ctrl {
      border: none;
      background: transparent;
      padding: 12px;
      cursor: pointer;
      color: var(--control-tint);
      border-radius: 50%;
      transition: opacity 0.15s ease, transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl:hover {
      opacity: 0.85;
    }

    .ctrl:active {
      transform: scale(0.94);
    }

    .ctrl:focus-visible {
      outline: 2px solid #007aff;
      outline-offset: 2px;
    }

    .ctrl--skip {
      color: var(--control-tint);
    }

    .ctrl--skip svg {
      display: block;
    }

    .ctrl--play {
      width: 72px;
      height: 72px;
      padding: 0;
      background: var(--play-circle);
      color: var(--play-icon);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
    }

    .ctrl--play:hover {
      opacity: 1;
      filter: brightness(1.08);
    }

    .ctrl--play svg {
      display: block;
      margin-left: 3px;
    }

    .ctrl--play.is-paused svg {
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <main class="player" aria-label="Podcast player">
    <h1 class="title">Daily Sparks – People at Hypersolid</h1>

    <div class="cover-wrap">
      <canvas id="cover" width="64" height="64" aria-label="Animated pixel art campfire cover"></canvas>
    </div>

    <div class="progress-block">
      <div class="progress-track" role="progressbar" aria-valuenow="78" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="timeLabel">4:21</span>
    </div>

    <div class="controls">
      <button type="button" class="ctrl ctrl--skip" id="skipBack" aria-label="Skip back 15 seconds">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" aria-hidden="true">
          <path
            fill="currentColor"
            d="M22 9.5a12.5 12.5 0 1 1 0 25 12.5 12.5 0 0 1 0-25Zm0 2.2a10.3 10.3 0 1 0 .01 20.6 10.3 10.3 0 0 0 0-20.6Z"
            opacity=".35"
          />
          <path
            fill="currentColor"
            d="M22 11.2a10.8 10.8 0 0 1 7.8 18.3l-1.6-1.6a8.6 8.6 0 1 0-6.1-14.7V16h-2.2v-7h7v2.2h-4.9a8.6 8.6 0 0 1 7 3.7Z"
          />
          <text
            x="22"
            y="25.5"
            text-anchor="middle"
            font-size="10.5"
            font-weight="700"
            fill="currentColor"
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
          >15</text>
        </svg>
      </button>

      <button type="button" class="ctrl ctrl--play is-paused" id="playPause" aria-label="Play">
        <svg class="icon-play" width="28" height="28" viewBox="0 0 28 28" fill="currentColor" aria-hidden="true">
          <path d="M8 5.5v17L22 14 8 5.5z" />
        </svg>
        <svg class="icon-pause" width="28" height="28" viewBox="0 0 28 28" fill="currentColor" aria-hidden="true" style="display:none">
          <path d="M9 6h4v16H9V6zm6 0h4v16h-4V6z" />
        </svg>
      </button>

      <button type="button" class="ctrl ctrl--skip" id="skipFwd" aria-label="Skip forward 30 seconds">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none" aria-hidden="true">
          <path
            fill="currentColor"
            d="M22 9.5a12.5 12.5 0 1 0 0 25 12.5 12.5 0 0 0 0-25Zm0 2.2a10.3 10.3 0 1 1 0 20.6 10.3 10.3 0 0 1 0-20.6Z"
            opacity=".35"
          />
          <path
            fill="currentColor"
            d="M22 11.2a10.8 10.8 0 0 0-7.8 18.3l1.6-1.6a8.6 8.6 0 1 1 6.1-14.7V16h2.2v-7h-7v2.2h4.9a8.6 8.6 0 0 0-7 3.7Z"
          />
          <text
            x="22"
            y="25.5"
            text-anchor="middle"
            font-size="10.5"
            font-weight="700"
            fill="currentColor"
            font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
          >30</text>
        </svg>
      </button>
    </div>
  </main>

  <script>
    (function () {
      const canvas = document.getElementById("cover");
      const wrap = canvas.parentElement;
      const ctx = canvas.getContext("2d");
      const logical = 64;
      function resize() {
        const css = wrap.clientWidth;
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.style.width = css + "px";
        canvas.style.height = css + "px";
        canvas.width = Math.round(logical * dpr);
        canvas.height = Math.round(logical * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener("resize", resize);
      if (typeof ResizeObserver !== "undefined") {
        new ResizeObserver(() => resize()).observe(wrap);
      }
      const W = logical;
      const H = logical;

      const navy = "#0a1628";
      const log = "#5c3d2e";
      const logDark = "#3d281c";
      const flameCore = "#ffcc00";
      const flameMid = "#ff8800";
      const flameOut = "#ff4400";
      const spark = "#ffaa44";

      function rect(x, y, w, h, c) {
        ctx.fillStyle = c;
        ctx.fillRect(x, y, w, h);
      }

      const sparks = [];
      for (let i = 0; i < 8; i++) {
        sparks.push({
          x: 28 + (Math.random() * 16 - 8),
          y: 28 + Math.random() * 8,
          vy: 0.15 + Math.random() * 0.25,
          life: Math.random(),
        });
      }

      let t = 0;

      function drawFrame() {
        t += 1;
        const flicker = Math.sin(t * 0.12) * 0.5 + Math.sin(t * 0.23) * 0.3;

        ctx.fillStyle = navy;
        ctx.fillRect(0, 0, W, H);

        rect(26, 40, 14, 6, logDark);
        rect(24, 42, 18, 4, log);
        rect(30, 22, 6, 22, logDark);
        rect(28, 24, 10, 18, log);

        const fh = 3 + Math.floor(flicker);
        rect(30, 36 - fh, 4, fh + 4, flameOut);
        rect(29, 35 - fh, 6, fh + 5, flameMid);
        rect(30, 34 - fh, 4, fh + 4, flameCore);
        rect(27, 38 - fh, 2, 3, flameMid);
        rect(35, 37 - fh, 2, 3, flameMid);

        for (const s of sparks) {
          s.y -= s.vy;
          s.life += 0.04;
          if (s.y < 10 || s.life > 1) {
            s.x = 28 + (Math.random() * 14 - 7);
            s.y = 30 + Math.random() * 4;
            s.vy = 0.12 + Math.random() * 0.2;
            s.life = 0;
          }
          const a = 0.4 + Math.sin(s.life * Math.PI) * 0.6;
          ctx.globalAlpha = a;
          rect(Math.floor(s.x), Math.floor(s.y), 1, 1, spark);
          ctx.globalAlpha = 1;
        }
      }

      function loop() {
        drawFrame();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();

    (function () {
      const fill = document.getElementById("progressFill");
      const timeLabel = document.getElementById("timeLabel");
      const playBtn = document.getElementById("playPause");
      const iconPlay = playBtn.querySelector(".icon-play");
      const iconPause = playBtn.querySelector(".icon-pause");

      const totalSec = 5 * 60 + 32;
      let currentSec = (4 * 60 + 21);
      let playing = false;
      let raf = 0;
      let last = 0;

      function fmt(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ":" + (s < 10 ? "0" : "") + s;
      }

      function renderProgress() {
        const p = Math.min(100, (currentSec / totalSec) * 100);
        fill.style.width = p + "%";
        timeLabel.textContent = fmt(Math.min(currentSec, totalSec));
      }

      function tick(ts) {
        if (!last) last = ts;
        const dt = (ts - last) / 1000;
        last = ts;
        if (playing) {
          currentSec = Math.min(totalSec, currentSec + dt);
          renderProgress();
          if (currentSec >= totalSec) {
            playing = false;
            playBtn.classList.add("is-paused");
            playBtn.setAttribute("aria-label", "Play");
            iconPlay.style.display = "";
            iconPause.style.display = "none";
            cancelAnimationFrame(raf);
            raf = 0;
            last = 0;
            return;
          }
        }
        raf = requestAnimationFrame(tick);
      }

      document.getElementById("skipBack").addEventListener("click", () => {
        currentSec = Math.max(0, currentSec - 15);
        renderProgress();
      });

      document.getElementById("skipFwd").addEventListener("click", () => {
        currentSec = Math.min(totalSec, currentSec + 30);
        renderProgress();
      });

      playBtn.addEventListener("click", () => {
        playing = !playing;
        if (playing) {
          playBtn.classList.remove("is-paused");
          playBtn.setAttribute("aria-label", "Pause");
          iconPlay.style.display = "none";
          iconPause.style.display = "";
          last = 0;
          raf = requestAnimationFrame(tick);
        } else {
          playBtn.classList.add("is-paused");
          playBtn.setAttribute("aria-label", "Play");
          iconPlay.style.display = "";
          iconPause.style.display = "none";
          cancelAnimationFrame(raf);
          raf = 0;
          last = 0;
        }
      });

      renderProgress();
    })();
  </script>
</body>
</html>
